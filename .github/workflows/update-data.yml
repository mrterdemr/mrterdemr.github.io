name: Update repos.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub data and write repos.json
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          user = "mrterdemr"
          token = os.environ["GH_TOKEN"]
          excluded = {"mrterdemr.github.io"}

          def gh_get(url):
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          all_repos = gh_get(f"https://api.github.com/users/{user}/repos?per_page=100&sort=pushed&type=owner")

          target_repos = [
              r for r in all_repos
              if not r.get("fork") and not r.get("private") and r["name"] not in excluded
          ]

          commits = []
          for repo in target_repos:
              name = repo["name"]
              repo_url = repo["html_url"]
              try:
                  raw_commits = gh_get(f"https://api.github.com/repos/{user}/{name}/commits?per_page=5")
                  for c in raw_commits:
                      msg = (c.get("commit") or {}).get("message") or ""
                      first_line = msg.split("\n")[0]
                      committer = (c.get("commit") or {}).get("committer") or {}
                      author = (c.get("commit") or {}).get("author") or {}
                      iso_date = committer.get("date") or author.get("date") or ""
                      commits.append({
                          "repo": name,
                          "repoUrl": repo_url,
                          "commitUrl": c.get("html_url", ""),
                          "note": first_line,
                          "isoDate": iso_date,
                      })
              except Exception as e:
                  print(f"Skipping commits for {name}: {e}")

          for r in target_repos:
              r.pop("permissions", None)

          output = {
              "generatedAt": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "repos": target_repos,
              "commits": commits,
          }

          with open("repos.json", "w") as f:
              json.dump(output, f, indent=2)
              f.write("\n")

          print(f"Done: {len(target_repos)} repos, {len(commits)} commits")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet repos.json || (
            git add repos.json &&
            git commit -m "chore: update repos.json [skip ci]" &&
            git push
          )
